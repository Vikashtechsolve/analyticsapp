services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/leetcode-analytics
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      SYNC_INTERVAL_HOURS: 6
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
